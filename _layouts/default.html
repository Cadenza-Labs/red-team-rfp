<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; color: #222; max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem; line-height: 1.6; }
    h1, h2, h3 { font-weight: 600; }
    h2 { margin-top: 2.5rem; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
    th { background: #f5f5f5; }
    blockquote { border-left: 4px solid #ddd; margin: 0; padding: 0.5rem 1rem; color: #555; background: #fafafa; }
    code { background: #f0f0f0; padding: 2px 5px; border-radius: 3px; font-size: 0.9em; }
    hr { border: none; border-top: 1px solid #e0e0e0; margin: 2rem 0; }
    a { color: #0066cc; }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
