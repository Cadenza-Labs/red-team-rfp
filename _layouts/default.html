<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --surface: #ffffff;
      --border: #e5e5e0;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --accent: #1a3a6b;
      --accent-light: #eef2f9;
      --accent-mid: #3060b0;
      --highlight: #f0f5ff;
      --warning-bg: #fffbeb;
      --warning-border: #f59e0b;
      --radius: 8px;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      padding: 0 1rem 4rem;
    }

    .page-wrap {
      max-width: 800px;
      margin: 0 auto;
    }

    /* ── logo bar ── */
    .page-wrap > div:first-child {
      padding: 2.5rem 0 2rem !important;
      border-bottom: 1px solid var(--border) !important;
      margin-bottom: 0 !important;
    }

    /* ── title block ── */
    .page-wrap > h2:first-of-type {
      font-family: 'Lora', Georgia, serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--accent);
      margin: 2.5rem 0 0.4rem;
      line-height: 1.2;
    }

    h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
      margin: 3rem 0 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 2px solid var(--accent-light);
    }

    h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin: 1.75rem 0 0.5rem;
    }

    p { margin: 0.75rem 0; }

    a { color: var(--accent-mid); text-decoration: none; }
    a:hover { text-decoration: underline; }

    strong { font-weight: 600; }

    ul, ol {
      margin: 0.5rem 0 0.5rem 1.5rem;
    }
    li { margin: 0.3rem 0; }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    /* ── blockquote (TL;DR) ── */
    blockquote {
      background: var(--highlight);
      border-left: 4px solid var(--accent-mid);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 1rem 1.25rem;
      margin: 1.25rem 0;
      color: var(--text);
    }
    blockquote p { margin: 0; }

    /* ── tables ── */
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
      font-size: 0.9rem;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    th {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      text-align: left;
      padding: 10px 14px;
    }
    td {
      padding: 9px 14px;
      border-top: 1px solid var(--border);
    }
    tr:nth-child(even) td { background: var(--accent-light); }

    /* ── code ── */
    code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: #f0f0ec;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.85em;
    }

    /* ── warning/info callout boxes ── */
    blockquote:has(strong:first-child) {
      background: var(--warning-bg);
      border-left-color: var(--warning-border);
    }

    /* ── meta line (Published | Due) ── */
    .page-wrap > p:first-of-type {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    /* ── airtable embed ── */
    .airtable-embed {
      border-radius: var(--radius) !important;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    @media (max-width: 600px) {
      .page-wrap > h2:first-of-type { font-size: 1.5rem; }
      table { font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    {{ content }}
  </div>
</body>
</html>
